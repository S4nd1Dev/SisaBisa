name: Sync to Hugging Face Spaces

on:
  push:
    branches: [main, master]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3
        with:
          lfs: true

      - name: Push to Hugging Face
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          # 1. Masuk ke dalam folder yang isinya sudah benar
          cd "Ai Engineer"

          # 2. Buat repositori Git super bersih (melupakan semua riwayat lama folder Model)
          git init
          git checkout -b main
          git config user.email "actions@github.com"
          git config user.name "GitHub Actions"

          # 3. Paksa pembuatan KTP LFS di root Hugging Face agar tidak ditolak
          echo "*.npy filter=lfs diff=lfs merge=lfs -text" > .gitattributes
          echo "*.keras filter=lfs diff=lfs merge=lfs -text" >> .gitattributes

          # 4. Bungkus semua file AI Engineer
          git add .
          git commit -m "Deploy fresh dari GitHub Actions"

          # 5. Tembak paksa ke Hugging Face (menggantikan 100% sistem lama)
          git push --force https://riyansandip:$HF_TOKEN@huggingface.co/spaces/riyansandip/api-SIsaBisa main:main
