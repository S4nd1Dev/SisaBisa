name: Sync to Hugging Face Spaces

on:
  push:
    branches: [main, master]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3
        with:
          lfs: true

      - name: Deploy to Hugging Face
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          # Masuk ke folder yang isinya AI Engineer
          cd "Ai Engineer"

          # Bikin Git baru yang amnesia dari masa lalu
          git init
          git checkout -b main
          git config user.email "actions@github.com"
          git config user.name "GitHub Actions"

          # Aktifkan LFS di dalam mesin robot
          git lfs install

          # Buat KTP LFS langsung di tempat (Tambah xlsx di sini!)
          echo "*.npy filter=lfs diff=lfs merge=lfs -text" > .gitattributes
          echo "*.keras filter=lfs diff=lfs merge=lfs -text" >> .gitattributes
          echo "*.xlsx filter=lfs diff=lfs merge=lfs -text" >> .gitattributes

          # Paksa robot membawa file Excel
          git add -f "dataset_resep_format_final.xlsx" 2>/dev/null || true
          git add -f "Dataset_Resep_Format_Final.xlsx" 2>/dev/null || true

          # Bungkus dan tembak paksa ke Hugging Face
          git add .
          git commit -m "Deploy full AI SisaBisa beserta Excel lewat LFS"
          git push --force https://riyansandip:$HF_TOKEN@huggingface.co/spaces/riyansandip/api-SIsaBisa main:main
