name: Sync to Hugging Face Spaces

on:
  push:
    branches: [main, master]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Deploy to Hugging Face
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          # Masuk ke folder yang isinya AI Engineer
          cd "Ai Engineer"
          
          # Bikin Git baru yang amnesia dari masa lalu
          git init
          git checkout -b main
          git config user.email "actions@github.com"
          git config user.name "GitHub Actions"
          
          # Buat KTP LFS langsung di tempat
          echo "*.npy filter=lfs diff=lfs merge=lfs -text" > .gitattributes
          echo "*.keras filter=lfs diff=lfs merge=lfs -text" >> .gitattributes
          
          # Bungkus dan tembak paksa ke Hugging Face
          git add .
          git commit -m "Deploy fresh dari GitHub Actions"
          git push --force https://riyansandip:$HF_TOKEN@huggingface.co/spaces/riyansandip/api-SIsaBisa main:main
